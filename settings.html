<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Quick settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main>
      <h1 id="heading">Translation language</h1>
      <label id="languageLabel" for="targetLanguage">Select language</label>
      <select id="targetLanguage" name="targetLanguage">
        <option value="English">English</option>
        <option value="Español">Español</option>
        <option value="Français">Français</option>
        <option value="Deutsch">Deutsch</option>
        <option value="Italiano">Italiano</option>
        <option value="Português">Português</option>
        <option value="Nederlands">Nederlands</option>
        <option value="日本語">日本語</option>
        <option value="中文">中文</option>
      </select>
      <button id="saveButton" type="button">Save settings</button>
      <p id="status" role="status" aria-live="polite"></p>
      <a id="openOptions" href="#">Open full settings</a>
    </main>

    <script src="i18n.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
