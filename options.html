<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Translation settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1 id="heading">Perplexity Selection Translator</h1>
      <p id="description">Choose the language you want selected text translated into.</p>

      <form id="settings-form">
        <label id="languageLabel" for="targetLanguage">Target language</label>
        <select id="targetLanguage" name="targetLanguage" required>
          <option value="English">English</option>
          <option value="Español">Español</option>
          <option value="Français">Français</option>
          <option value="Deutsch">Deutsch</option>
          <option value="Italiano">Italiano</option>
          <option value="Português">Português</option>
          <option value="Nederlands">Nederlands</option>
          <option value="日本語">日本語</option>
          <option value="中文">中文</option>
        </select>

        <button id="saveButton" type="submit">Save settings</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
