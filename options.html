<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuración de traducción</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Perplexity Selection Translator</h1>
      <p>Elige el idioma al que quieres traducir el texto seleccionado.</p>

      <form id="settings-form">
        <label for="targetLanguage">Idioma de destino</label>
        <select id="targetLanguage" name="targetLanguage" required>
          <option value="English">English</option>
          <option value="Español">Español</option>
          <option value="Français">Français</option>
          <option value="Deutsch">Deutsch</option>
          <option value="Italiano">Italiano</option>
          <option value="Português">Português</option>
          <option value="Nederlands">Nederlands</option>
          <option value="日本語">日本語</option>
          <option value="中文">中文</option>
        </select>

        <button type="submit">Guardar configuración</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
